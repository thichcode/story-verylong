<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Story VeryLong</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { font-family: 'Space Grotesk', sans-serif; color: #f8fafc; background: #01030a; }
    body { margin:0; background: radial-gradient(circle at top, rgba(56,189,248,.25), transparent 40%), #01030a; }
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 60px; }
    .hero { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:32px; }
    .hero h1 { font-size:2.5rem; margin:0; letter-spacing:.1em; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; }
    .panel { background: rgba(15,23,42,.8); border:1px solid rgba(56,189,248,.4); border-radius:20px; padding:18px; box-shadow:0 20px 60px rgba(0,0,0,.7); }
    label { display:block; margin-bottom:8px; font-size:.85rem; color:#94a3b8; }
    input, select, textarea { width:100%; padding:10px 12px; border-radius:12px; background:rgba(15,23,42,.7); border:1px solid rgba(148,163,184,.35); color:#f8fafc; font-size:.95rem; }
    button { width:100%; padding:12px; margin-top:12px; border:none; border-radius:12px; background:linear-gradient(135deg, #38bdf8, #a855f7); color:#030712; font-weight:700; cursor:pointer; }
    .output { background:rgba(15,23,42,.6); border:1px solid rgba(255,255,255,.08); border-radius:18px; padding:18px; margin-top:20px; }
    .chapter { margin-bottom:18px; }
    h2 { margin-top:0; }
    .meta { display:flex; gap:12px; margin-bottom:8px; font-size:.8rem; color:#94a3b8; }
  </style>
</head>
<body>
<main>
  <div class="hero">
    <h1>Story VeryLong</h1>
    <div class="meta">Create epic threads with local LLMs.</div>
  </div>
  <div class="grid">
    <div class="panel">
      <h2>Brief key inputs</h2>
      <form id="story-form">
        <label>Title</label>
        <input name="title" placeholder="The Last Starship" required />
        <label>Genre</label>
        <select name="genre"><option>Fantasy</option><option>Sci-Fi</option><option>Thriller</option><option>Romance</option></select>
        <label>Tone</label>
        <select name="tone"><option>epic</option><option>mysterious</option><option>fast</option></select>
        <label>Chapters</label>
        <input type="number" name="chapters" min="3" max="12" value="6" />
        <label>Focus (optional)</label>
        <textarea name="focus" rows="2" placeholder="e.g. crew drama, climate war"></textarea>
        <button type="submit">Generate Outline</button>
      </form>
    </div>
    <div class="panel">
      <h2>Output summary</h2>
      <div id="summary">No output yet.</div>
      <div class="meta" id="story-meta"></div>
    </div>
  </div>
  <div id="outline"></div>
</main>
<script>
  const form = document.getElementById('story-form');
  const summary = document.getElementById('summary');
  const outline = document.getElementById('outline');
  const storyMeta = document.getElementById('story-meta');

  form.addEventListener('submit', async event => {
    event.preventDefault();
    const data = Object.fromEntries(new FormData(form).entries());
    data.chapters = Number(data.chapters);
    summary.textContent = 'Generating story...';
    outline.innerHTML = '';
    const resp = await fetch('/api/story', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    const payload = await resp.json();
    summary.textContent = payload.summary;
    storyMeta.textContent = `Chapters: ${payload.chapters.length} · ${payload.cover}`;
    outline.innerHTML = payload.chapters.map((c,i)=>`<div class="panel chapter"><h3>Chapter ${i+1}</h3><p>${c}</p></div>`).join('');
  });
</script>
</body>
</html>
